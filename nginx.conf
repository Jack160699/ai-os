# Nginx site fragment for ai-os (WhatsApp webhook + health check).
#
# Install (example):
#   sudo cp nginx.conf /etc/nginx/sites-available/ai-os
#   sudo ln -sf /etc/nginx/sites-available/ai-os /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace server_name with your domain; use Certbot for HTTPS (required for production WhatsApp webhooks).

upstream ai_os_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://ai_os_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # OpenAI + Graph API downstream calls can be slow
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
